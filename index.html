<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — En construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0b;
      --accent: #d4a853;
      --accent-dim: #d4a85322;
      --text: #e8e2d9;
      --muted: #666;
      --border: #1f1f1f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Fond animé ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: .4;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;  transform: translate(-50%, -50%) scale(1.08); }
    }

    /* ── Contenu ── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      gap: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: .7rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: .4rem 1rem;
      border-radius: 2rem;
      animation: fadeUp .6s .1s ease both;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .2; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 9vw, 6.5rem);
      line-height: 1.05;
      animation: fadeUp .6s .2s ease both;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .sub {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.8;
      max-width: 42ch;
      animation: fadeUp .6s .3s ease both;
    }

    /* ── Barre de progression ── */
    .progress-wrap {
      width: min(400px, 90vw);
      animation: fadeUp .6s .4s ease both;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: .72rem;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .6rem;
      text-transform: uppercase;
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), #f0c87a);
      border-radius: 99px;
      animation: fillBar 2s .8s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes fillBar {
      to { width: 30%; }
    }

    /* ── Contact ── */
    .contact {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .6s .5s ease both;
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      letter-spacing: .04em;
      padding: .55rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: .3rem;
      transition: all .25s;
    }
    .contact a:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
      animation: fadeUp .6s .6s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="glow"></div>

  <main>
    <span class="badge"><span class="dot"></span> En construction</span>

    <h1><em>Nathan</em><br>MICHONNEAU</h1>

    <p class="sub" style="font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:-.5rem;">BUT SD1</p>

    <p class="sub">
      Je travaille en ce moment à la création de mon portfolio.<br>
      Revenez très prochainement pour découvrir mes projets.
    </p>

    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Progression</span>
        <span>30%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="contact">
      <a href="mailto:nathanmichonneau79@gmail.com">
        ✉ nathanmichonneau79@gmail.com
      </a>
    </div>
  </main>

  <footer>© 2026 Nathan MICHONNEAU — Portfolio en cours de développement</footer>

</body>
</html>
